[project]
name = "AlphaWalker"
version = "0.1.0"
entry-point = "main.jac"

[test]
directory = "tests"

[dependencies.npm]
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
react-hook-form = "^7.71.0"
zod = "^4.3.6"
"@hookform/resolvers" = "^5.2.2"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[plugins]

[plugins.byllm]

[plugins.byllm.model]
default_model = "ollama_chat/llama3.2"
api_key = "6a3f1562609243e096a8cbdf989b4172.7iwP5mz4VA9KOQ1fduEQ6Arl"

[plugins.byllm.call_params]
temperature = 0.3
max_tokens = 512

[plugins.byllm.litellm]
local_cost_map = true
drop_params = true
